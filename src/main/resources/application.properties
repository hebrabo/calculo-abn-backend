spring.application.name=calculo-abn-backend

# 1. El Port (Render assigna un port din\u00E0mic; si no el troba, usa el 8080)
server.port=${PORT:8080}

# 2. Dades de connexi\u00F3 din\u00E0miques (Llegir\u00E0 les variables que posarem a Render)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# 3. Configuraci\u00F3 de JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# 4. Jackson (Evita errors si el JSON est\u00E0 buit)
spring.jackson.serialization.fail-on-empty-beans=false

# 5. Swagger (Opcional, per provar l'API)
springdoc.swagger-ui.path=/swagger
