spring.application.name=calculo-abn-backend

# 1. El Port (Render asigna un port dinamic; si no el troba, usa el 8080)
server.port=${PORT:8080}

# 2. Datos de conexion para Windows (Local)
spring.datasource.url=jdbc:postgresql://localhost:5432/abn_db
spring.datasource.username=postgres
spring.datasource.password=Dam202526.

# Forcem el driver per evitar confusions
spring.datasource.driver-class-name=org.postgresql.Driver

# 3. Configuracio de JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# 4. Jackson (Evita errors si el JSON esta buit)
spring.jackson.serialization.fail-on-empty-beans=false

# 5. Swagger (Opcional, per provar l'API)
springdoc.swagger-ui.path=/swagger