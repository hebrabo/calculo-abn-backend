# 1. Configuració de la Base de Dades (Prioritat AWS/RDS, fallback a H2 en local)
# Si no hi ha variables d'entorn, farà servir H2 per no donar error al PC
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:abn_db;DB_CLOSE_DELAY=-1}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}

# 2. Configuració de JPA / Hibernate
# En local amb H2 necessitem 'update' perquè creï les taules automàticament
spring.jpa.hibernate.ddl-auto=${HIBERNATE_DDL:update}
spring.jpa.show-sql=true
spring.jpa.defer-datasource-initialization=true

# 3. Configuració de Swagger
springdoc.swagger-ui.path=/documentacion
springdoc.swagger-ui.operationsSorter=method

# 4. Configuracions addicionals del projecte
spring.application.name=calculo-abn-backend
server.port=${PORT:8080}
spring.jackson.serialization.fail-on-empty-beans=false

# 5. Consola H2 (Útil per a les proves en local)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console