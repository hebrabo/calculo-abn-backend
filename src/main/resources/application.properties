# 1. Configuracio de la Base de Dades
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:abn_db;DB_CLOSE_DELAY=-1}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}


# 2. Configuracio de JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${HIBERNATE_DDL:update}
spring.jpa.show-sql=true
spring.jpa.defer-datasource-initialization=true

# 3. Configuracio de Swagger
springdoc.swagger-ui.path=/documentacion
springdoc.swagger-ui.operationsSorter=method

# 4. Configuracions addicionals del projecte
spring.application.name=calculo-abn-backend
server.port=${PORT:8080}
spring.jackson.serialization.fail-on-empty-beans=false

# 5. Consola H2 (util per a les proves en local)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Aquesta l\u00EDnia ajuda a Hibernate a AWS:
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect