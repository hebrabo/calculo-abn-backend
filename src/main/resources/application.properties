spring.application.name=calculo-abn-backend

# 1. El Port (Render asigna un port dinamic; si no el troba, usa el 8080)
server.port=${PORT:8080}

# 2. Datos de conexion DUALS
# Fem que PostgreSQL sigui el driver per defecte per a Render
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:abn_db;DB_CLOSE_DELAY=-1}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
# Canviem la prioritat del driver:
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.postgresql.Driver}

# 3. Configuracio H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# 4. Configuracio de JPA / Hibernate
# Per a Render, usa 'update' per no esborrar dades,
# peṛ en local el profe pot canviar-ho a 'create-drop'
spring.jpa.hibernate.ddl-auto=update