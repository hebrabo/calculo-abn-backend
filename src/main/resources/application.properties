spring.application.name=calculo-abn-backend

# 1. El Port (Render asigna un port dinamic; si no el troba, usa el 8080)
server.port=${PORT:8080}

# 2. Datos de conexion DUALS
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:abn_db;DB_CLOSE_DELAY=-1}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# Forcem que primer es cre’n les taules i desprķs s'executi l'import.sql
spring.jpa.defer-datasource-initialization=true
spring.jpa.hibernate.ddl-auto=update

# 3. Configuracio H2 Console (nomķs per a local)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console