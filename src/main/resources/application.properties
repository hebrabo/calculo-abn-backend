spring.application.name=calculo-abn-backend

# 1. El Port (Render assigna un port din\u00E0mic; si no el troba, usa el 8080)
server.port=${PORT:8080}

# 2. Dades de connexiˇ per a Windows (Local)
# Substitueix 'nom_de_la_teva_bd' pel nom que hagis creat al pgAdmin
spring.datasource.url=jdbc:postgresql://localhost:5432/abn_db
spring.datasource.username=postgres
spring.datasource.password=Dam202526.

# Forcem el driver per evitar confusions
spring.datasource.driver-class-name=org.postgresql.Driver

# 3. Configuraciˇ de JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# 4. Jackson (Evita errors si el JSON est\u00E0 buit)
spring.jackson.serialization.fail-on-empty-beans=false

# 5. Swagger (Opcional, per provar l'API)
springdoc.swagger-ui.path=/swagger
