spring.application.name=calculo-abn-backend

# 1. El Port (Render asigna un port dinamic; si no el troba, usa el 8080)
server.port=${PORT:8080}

# 2. Datos de conexion DUALS
# En local: Usa H2 en memoria per defecte
# A Render: Usa les variables d'entorn (SPRING_DATASOURCE_URL)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:abn_db;DB_CLOSE_DELAY=-1}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}

# 3. Configuracio H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# 4. Configuracio de JPA / Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# 5. Jackson i Swagger
spring.jackson.serialization.fail-on-empty-beans=false
springdoc.swagger-ui.path=/swagger