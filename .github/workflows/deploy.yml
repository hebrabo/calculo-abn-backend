name: Deploy Docker a Elastic Beanstalk

on:
  push:
    branches: [ "main" ]

# Permisos necessaris per pujar paquets a GitHub Container Registry
permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. Baixar el codi del repositori
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Configurar Java
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      # 3. Compilar (saltem tests)
      - name: Build with Maven
        run: mvn clean package -DskipTests

      # 4. Login al registre de contenidors de GitHub (GHCR)
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 5. Calcular nom de la imatge en minúscules
      - name: Lowercase Image Name
        run: |
          echo "IMAGE_NAME=$(echo ghcr.io/${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      # 6. Construir i pujar la imatge Docker
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ github.run_number }}

      # 7. Generar fitxer docker-compose.yml per a Amazon Linux 2023
      - name: Generate docker-compose.yml
        run: |
          echo "services:
            app:
              image: ${{ env.IMAGE_NAME }}:${{ github.run_number }}
              ports:
                - '80:8080'
              environment:
                - SPRING_DATASOURCE_URL
                - SPRING_DATASOURCE_USERNAME
                - SPRING_DATASOURCE_PASSWORD
              restart: always" > docker-compose.yml

      # 8. Desplegar a AWS Elastic Beanstalk
      - name: Deploy to Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v21
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws_session_token: ${{ secrets.AWS_SESSION_TOKEN }}
          region: us-east-1
          application_name: CalculoABN-API
          environment_name: CalculoABN-API-env
          version_label: "abn-v-${{ github.run_number }}"
          deployment_package: docker-compose.yml